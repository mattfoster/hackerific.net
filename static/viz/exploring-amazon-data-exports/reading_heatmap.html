function minutesToLevel(mins) {
  if (mins === 0) return 0;
  if (mins < 10) return 1;
  if (mins < 30) return 2;
  if (mins < 60) return 3;
  return 4;
}

function getYearRange(readData, listenData) {
  const dates = [...Object.keys(readData), ...Object.keys(listenData)].sort();
  if (!dates.length) return [];
  const firstYear = parseInt(dates[0].slice(0, 4));
  const lastYear = parseInt(dates[dates.length - 1].slice(0, 4));
  const years = [];
  for (let y = lastYear; y >= firstYear; y--) years.push(y);
  return years;
}

function buildYearGrid(year, readData, listenData) {
  const jan1 = new Date(year, 0, 1);
  const dec31 = new Date(year, 11, 31);
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const startDay = new Date(jan1);
  startDay.setDate(startDay.getDate() - startDay.getDay());

  const weeks = [];
  let current = new Date(startDay);

  while (current <= dec31 || current.getDay() !== 0) {
    if (current > dec31 && current.getDay() === 0 && weeks.length > 0) break;
    const weekIdx = weeks.length === 0 || current.getDay() === 0 ? weeks.push([]) - 1 : weeks.length - 1;
    const dateStr = current.toISOString().slice(0, 10);
    const inYear = current.getFullYear() === year;
    const inFuture = current > today;
    const readMins = readData[dateStr] || 0;
    const listenMins = listenData[dateStr] || 0;

    weeks[weekIdx].push({
      date: dateStr,
      readMinutes: readMins,
      listenMinutes: listenMins,
      readLevel: inYear && !inFuture ? minutesToLevel(readMins) : -1,
      listenLevel: inYear && !inFuture ? minutesToLevel(listenMins) : -1,
    });
    current.setDate(current.getDate() + 1);
  }
  return weeks;
}

function getMonthPositions(weeks, year) {
  const months = [];
  let lastMonth = -1;
  weeks.forEach((week, wi) => {
    for (const day of week) {
      if (day.date.startsWith(String(year))) {
        const m = parseInt(day.date.slice(5, 7)) - 1;
        if (m !== lastMonth) {
          months.push({ month: m, weekIdx: wi });
          lastMonth = m;
        }
        break;
      }
    }
  });
  return months;
}

function makeCellSVG(readLevel, listenLevel) {
  const s = 11;
  const hasRead = readLevel > 0;
  const hasListen = listenLevel > 0;

  if (!hasRead && !hasListen) {
    // Empty cell — just background
    return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" fill="${BG}"/></svg>`;
  }

  if (hasRead && !hasListen) {
    return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" fill="${READ_COLORS[readLevel]}"/></svg>`;
  }

  if (!hasRead && hasListen) {
    return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" fill="${LISTEN_COLORS[listenLevel]}"/></svg>`;
  }

  // Both: diagonal split — reading top-left, listening bottom-right
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">` +
    `<polygon points="0,0 ${s},0 0,${s}" fill="${READ_COLORS[readLevel]}"/>` +
    `<polygon points="${s},0 ${s},${s} 0,${s}" fill="${LISTEN_COLORS[listenLevel]}"/>` +
    `</svg>`;
}

  const section = document.createElement('div');

  const label = document.createElement('div');

  let lastX = -4;

  container.appendChild(grid);
  section.appendChild(container);
  return section;
}

function formatMinutes(m) {
  if (m < 60) return m + ' minutes';
  const h = Math.floor(m / 60);
  const r = m % 60;
  return r ? `${h}h ${r}m` : `${h}h`;
}

function main() {
  const readData = READ_DATA_INLINE;
  const listenData = LISTEN_DATA_INLINE;
  const years = getYearRange(readData, listenData);

  // Stats
  const readDays = Object.keys(readData).length;
  const readMins = Object.values(readData).reduce((a, b) => a + b, 0);
  const maxRead = Math.max(0, ...Object.values(readData));
  const listenDays = Object.keys(listenData).length;
  const listenMins = Object.values(listenData).reduce((a, b) => a + b, 0);
  const maxListen = Math.max(0, ...Object.values(listenData));

  const statsEl = document.getElementById('stats');
  [
    [readDays, 'Days reading', false],
    [formatMinutes(readMins), 'Total reading time', false],
    [formatMinutes(maxRead), 'Longest reading day', false],
    [listenDays, 'Days listening', true],
    [formatMinutes(listenMins), 'Total listening time', true],
    [formatMinutes(maxListen), 'Longest listening day', true],
  ].forEach(([val, label, isAudible]) => {
    const div = document.createElement('div');
    div.className = 'stat';
    div.innerHTML = `<div class="stat-value${isAudible ? ' audible' : ''}">${val}</div><div class="stat-label">${label}</div>`;
    statsEl.appendChild(div);
  });

  const app = document.getElementById('app');

  for (const year of years) {
    app.appendChild(renderYear(year, readData, listenData));
  }

  // Legend
  const legend = document.createElement('div');
  legend.className = 'legend';

  // Reading legend
  const readGroup = document.createElement('div');
  readGroup.className = 'legend-group';
  readGroup.innerHTML = '📖 Less ';
  READ_COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'day';
    d.style.background = c;
    readGroup.appendChild(d);
  });
  readGroup.innerHTML += ' More';
  legend.appendChild(readGroup);

  // Listening legend
  const listenGroup = document.createElement('div');
  listenGroup.className = 'legend-group';
  listenGroup.innerHTML = '🎧 Less ';
  LISTEN_COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'day';
    d.style.background = c;
    listenGroup.appendChild(d);
  });
  listenGroup.innerHTML += ' More';
  legend.appendChild(listenGroup);

  app.appendChild(legend);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  document.addEventListener('mouseover', e => {
    const target = e.target.closest('.day[data-date]');
    if (target) {
      const d = new Date(target.dataset.date + 'T00:00:00');
      const readM = parseInt(target.dataset.readMinutes);
      const listenM = parseInt(target.dataset.listenMinutes);
      const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      const parts = [];
      if (readM > 0) parts.push(`📖 ${formatMinutes(readM)} reading`);
      if (listenM > 0) parts.push(`🎧 ${formatMinutes(listenM)} listening`);
      tooltip.innerHTML = parts.length
        ? `<strong>${parts.join(' · ')}</strong> on ${dateStr}`
        : `No activity on ${dateStr}`;
      tooltip.style.display = 'block';
    }
  });
  document.addEventListener('mousemove', e => {
    tooltip.style.left = e.clientX + 12 + 'px';
    tooltip.style.top = e.clientY - 30 + 'px';
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('.day')) tooltip.style.display = 'none';
  });
}

main();
</script>
</body>
</html>
